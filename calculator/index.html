<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <link rel="stylesheet" href="style.css">
    
</head>
<body>
    <div class="page">
        <div class="result">
            <span class="history">history</span>
            <span class="current-total">0</span>
        </div>
        <div>
            <button class="btn backspace-btn">
                <img src="assets/backspace.svg" alt="backspace-svg">
            </button>
        </div>
        <div>
            <button class="btn ac-btn">ac</button>
        </div>
        <div>
            <button class="btn sign percent-btn">%</button>
        </div>
        <div>
            <button class="btn sign div-btn">÷</button>
        </div>
        <div>
            <button class="btn number seven-btn">7</button>
        </div>
        <div>
            <button class="btn number eight-btn">8</button>
        </div>
        <div>
            <button class="btn number nine-btn">9</button>
        </div>
        <div>
            <button class="btn sign mult-btn">×</button>
        </div>
        <div>
            <button class="btn number four-btn">4</button>
        </div>
        <div>
            <button class="btn number five-btn">5</button>
        </div>
        <div>
            <button class="btn number six-btn">6</button>
        </div>
        <div>
            <button class="btn sign sub-btn">-</button>
        </div>
        <div>
            <button class="btn number one-btn">1</button>
        </div>
        <div>
            <button class="btn number two-btn">2</button>
        </div>
        <div>
            <button class="btn number three-btn">3</button>
        </div>
        <div>
            <button class="btn sign add-btn">+</button>
        </div>
        <div>
            <button class="btn plus-minus-btn">+/-</button>
        </div>
        <div>
            <button class="btn number zero-btn">0</button>
        </div>
        <div>
            <button class="btn coma-btn">.</button>
        </div>
        <div>
            <button class="btn eq-btn">=</button>
        </div>
    </div>
    <script src="scripts.js"></script>
</body>
</html>
