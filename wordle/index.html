<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="wordle.css">
</head>
<body>
    <div class="page">
        <div class="logo-section">
            <img src="assets/Wordle_Logo2.svg" class="wordle-logo">
            <h1 class="wordle-name">WORDLE</h1>
        </div>
        <div class="guess-section">
            <div class="guess-row">
                <div class="tile 1-1"></div>
                <div class="tile 1-2"></div>
                <div class="tile 1-3"></div>
                <div class="tile 1-4"></div>
                <div class="tile 1-5"></div>
            </div>
            <div class="guess-row">
                <div class="tile 2-1"></div>
                <div class="tile 2-2"></div>
                <div class="tile 2-3"></div>
                <div class="tile 2-4"></div>
                <div class="tile 2-5"></div>
            </div>
            <div class="guess-row">
                <div class="tile 3-1"></div>
                <div class="tile 3-2"></div>
                <div class="tile 3-3"></div>
                <div class="tile 3-4"></div>
                <div class="tile 3-5"></div>
            </div>
            <div class="guess-row">
                <div class="tile 4-1"></div>
                <div class="tile 4-2"></div>
                <div class="tile 4-3"></div>
                <div class="tile 4-4"></div>
                <div class="tile 4-5"></div>
            </div>
            <div class="guess-row">
                <div class="tile 5-1"></div>
                <div class="tile 5-2"></div>
                <div class="tile 5-3"></div>
                <div class="tile 5-4"></div>
                <div class="tile 5-5"></div>
            </div>
            <div class="guess-row">
                <div class="tile 6-1"></div>
                <div class="tile 6-2"></div>
                <div class="tile 6-3"></div>
                <div class="tile 6-4"></div>
                <div class="tile 6-5"></div>
            </div>
        </div>
        <div class="keyboard-section">
            <div class="keyboard-row">
                <button class="keyboard-button">Q</button>
                <button class="keyboard-button">W</button>
                <button class="keyboard-button">E</button>
                <button class="keyboard-button">R</button>
                <button class="keyboard-button">T</button>
                <button class="keyboard-button">Y</button>
                <button class="keyboard-button">U</button>
                <button class="keyboard-button">I</button>
                <button class="keyboard-button">O</button>
                <button class="keyboard-button">P</button>
            </div>
            <div class="keyboard-row">
                <div class="spacer"></div>
                <button class="keyboard-button">A</button>
                <button class="keyboard-button">S</button>
                <button class="keyboard-button">D</button>
                <button class="keyboard-button">F</button>
                <button class="keyboard-button">G</button>
                <button class="keyboard-button">H</button>
                <button class="keyboard-button">J</button>
                <button class="keyboard-button">K</button>
                <button class="keyboard-button">L</button>
                <div class="spacer"></div>
            </div>
            <div class="keyboard-row">
                <button class="keyboard-button special-key">ENTER</button>
                <button class="keyboard-button">Z</button>
                <button class="keyboard-button">X</button>
                <button class="keyboard-button">C</button>
                <button class="keyboard-button">V</button>
                <button class="keyboard-button">B</button>
                <button class="keyboard-button">N</button>
                <button class="keyboard-button">M</button>
                <button class="keyboard-button backspace special-key">
                    <img src="assets/backspace.svg" alt="backsapce-logo">
                </button>

            </div>
        </div>
    </div>
    <script src="wordle.js"></script>
</body>
</html>
